<!doctype html>
<html lang="el">

<head>
	<title>Φόρμα Παραγγελίας | Lazaros Kalantzis Foods</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<meta name="description" content="Φόρμα Παραγγελίας" />

	<link href='https://fonts.googleapis.com/css?family=Roboto:400,100,300,700' rel='stylesheet' type='text/css'>
	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
	<link rel="stylesheet" href="./css/header.css">
	<link rel="stylesheet" href="./css/contact_style.css">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
	<link rel="stylesheet"
		href="https://cdn.jsdelivr.net/npm/bootstrap-select@1.14.0-beta2/dist/css/bootstrap-select.min.css">
	<script src="https://kit.fontawesome.com/dc6deb9381.js" crossorigin="anonymous"></script>

	<link class="rounded-circle" rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
	<link rel="manifest" href="site.webmanifest">
	<link rel="mask-icon" href="safari-pinned-tab.svg" color="#5bbad5">
	<meta name="msapplication-TileColor" content="#da532c">
	<meta name="theme-color" content="#ffffff">

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/0.8.2/css/flag-icon.min.css">
</head>

<body class="bg-light py-5">

	<div class="container">
		<div class="row justify-content-center">
			<div class="col-md-8 col-lg-7">

				<div class="card shadow">
					<div class="card-body p-4">
						<h2 class="card-title h4 mb-3">Φόρμα Παραγγελίας Χονδρικής</h2>
						<p class="text-muted small mb-4">Επιλέξτε προϊόντα και ποσότητες. Δεν απαιτείται πληρωμή τώρα.
						</p>

						<form id="orderForm">
							<input type="hidden" name="access_key" value="544cca67-88e9-4dc7-8edf-b2a8d86c46b7">

							<div class="mb-3">
								<label for="name" class="form-label fw-bold">Όνομα / Εταιρεία</label>
								<input type="text" id="name" name="Όνομα_Πελάτη" class="form-control"
									placeholder="π.χ. Κατάστημα Α" required>
							</div>

							<div class="mb-3">
								<label for="email" class="form-label fw-bold">Email Επικοινωνίας</label>
								<input type="email" id="email" name="Email_Πελάτη" class="form-control"
									placeholder="name@example.com" required>
							</div>

							<div class="p-3 bg-secondary bg-opacity-10 rounded mb-4">
								<label for="search" class="form-label fw-bold">🔍 Αναζήτηση Προϊόντος</label>
								<input type="search" id="search" class="form-control"
									placeholder="Πληκτρολογήστε για φιλτράρισμα...">
							</div>

							<div class="mb-3">
								<div class="d-flex justify-content-between align-items-center mb-2">
									<label class="form-label fw-bold mb-0">Διαθέσιμα Προϊόντα</label>
									<button type="button" id="resetQuantitiesBtn"
										class="btn btn-outline-danger btn-sm fw-semibold" style="font-size: 0.8rem;">🗑️
										Μηδενισμός</button>
								</div>
								<div id="productsList" class="list-group overflow-auto border rounded"
									style="max-height: 52vh;">
									<div class="text-center text-muted p-4">Φόρτωση προϊόντων και τιμών από το Google
										Sheets...</div>
								</div>
							</div>

							<div class="p-3 bg-secondary bg-opacity-10 rounded mb-3 border">
								<div class="d-flex justify-content-between mb-2">
									<span class="fw-semibold text-dark">Συνολικά Κιβώτια:</span>
									<span id="totalBoxes" class="fw-bold text-success">0</span>
								</div>
								<hr class="my-2 text-muted">
								<div class="d-flex justify-content-between mb-2">
									<span class="fw-semibold text-muted">Καθαρή Αξία:</span>
									<span id="totalNet" class="fw-bold">€0.00</span>
								</div>
								<div class="d-flex justify-content-between">
									<span class="fw-semibold text-muted">Σύνολο με ΦΠΑ (13%):</span>
									<span id="totalVat" class="fw-bold text-primary">€0.00</span>
								</div>
							</div>

							<div id="formResponse" class="mt-3"></div>

							<div class="mb-3">
								<label for="comments" class="form-label fw-bold">Σχόλια / Ειδικές Σημειώσεις</label>
								<textarea id="comments" name="Σχόλια" class="form-control" rows="3"
									placeholder="Γράψτε τυχόν σχόλια ή σημειώσεις για την παραγγελία σας..."></textarea>
							</div>

							<button type="submit" id="submitBtn" class="btn btn-success w-100 py-2 fs-5 mt-2">Υποβολή
								Παραγγελίας</button>
						</form>
					</div>
				</div>

			</div>
		</div>
	</div>

	<script>

		const url = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTItrc4PJqFxrgnI4sQrh_8IN9ZgS9X80VT1XTYWN2CgdA87hmaaez3wDv8w7tJTBat8BAPdXOkX9Jo/pub?output=csv`;

		let myProductsList = [];
		const container = document.getElementById('productsList');
		const searchInput = document.getElementById('search');
		const orderForm = document.getElementById('orderForm');
		const formResponse = document.getElementById('formResponse');
		const submitBtn = document.getElementById('submitBtn');
		const resetQuantitiesBtn = document.getElementById('resetQuantitiesBtn');

		// Λήψη δεδομένων από το Google Sheet 
		fetch(url)
			.then(res => {
				if (!res.ok) throw new Error("Αδυναμία σύνδεσης με το Google Sheet.");
				return res.text();
			})
			.then(csvText => {
				const lines = csvText.split(/\r?\n/);
				if (lines.length > 0) lines.shift();

				myProductsList = lines.map((line, index) => {
					const columns = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
					if (columns && columns.length > 0) {
						const name = columns[2] ? columns[2].replace(/^"|"$/g, '').trim() : '';
						const priceRaw = columns[1] ? columns[1].replace(/^"|"$/g, '').trim() : '';

						const cleanPrice = parseFloat(priceRaw.replace(/[^0-9,.]/g, '').replace(',', '.')) || 0;

						const rawStep = columns[3] ? columns[3].replace(/^"|"$/g, '').trim() : '';
						const step = parseInt(rawStep, 10) || 10;

						return { id: index, name, price: cleanPrice, priceRaw, quantity: 0, step: step };
					}
					return null;
				}).filter(item => item !== null && item.name !== '');

				// 🔤 ΝΕΑ ΑΛΛΑΓΗ: Αλφαβητική ταξινόμηση των προϊόντων στα Ελληνικά κατά τη φόρτωση 
				myProductsList.sort((a, b) => a.name.localeCompare(b.name, 'el'));

				displayProducts();
				updateOrderSummary();
			})
			.catch(err => {
				container.innerHTML = `<div class='text-danger text-center p-4 small'><strong>Σφάλμα!</strong><br>${err.message}</div>`;
			});

		// Εμφάνιση προϊόντων στην οθόνη (Βελτιστοποιημένη responsive mobile δομή) 
		function displayProducts(filterText = "") {
			container.innerHTML = "";
			const filtered = myProductsList.filter(item => item.name.toLowerCase().includes(filterText.toLowerCase()));

			if (filtered.length === 0) {
				container.innerHTML = "<div class='text-center text-muted p-4'>Δεν βρέθηκαν προϊόντα.</div>";
				return;
			}

			filtered.forEach(item => {
				const safeProduct_Name = item.name.replace(/[^a-zA-Z0-9α-ωΑ-Ω]/g, '_');

				const priceDisplay = item.priceRaw ? `<span class="badge bg-primary rounded-pill me-2" style="font-size: 0.75rem; padding: 0.3em 0.6em; flex-shrink: 0;">${item.priceRaw}</span>` : '';

				const div = document.createElement('div');
				// Δομή flex-column σε κινητά, flex-sm-row σε desktop για τέλειο mobile layout 
				div.className = 'list-group-item d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center py-2.5';

				div.innerHTML = ` 
                <div class="d-flex align-items-center w-100 mb-2 mb-sm-0 pe-sm-2"> 
                    ${priceDisplay} 
                    <span class="text-wrap fw-semibold text-dark" style="font-size: 0.88rem; line-height: 1.3;">${item.name}</span> 
                </div> 
                 
                <div class="input-group input-group-sm qty-container ms-auto" data-product-id="${item.id}" style="width: auto; flex-wrap: nowrap;"> 
                    <button class="btn btn-outline-danger btn-qty px-2.5 fw-semibold" type="button" data-change="-${item.step}">-${item.step}</button> 
                    <button class="btn btn-outline-secondary btn-qty px-2.5" type="button" data-change="-1">-</button> 
                     
                    <input type="text"  
                           inputmode="numeric" 
                           pattern="[0-9]*" 
                           name="${safeProduct_Name}"  
                           class="form-control text-center qty-input"  
                           value="${item.quantity}"  
                           style="width: 46px; flex: none; font-size: 0.95rem; font-weight: 600;"> 
                     
                    <button class="btn btn-outline-secondary btn-qty px-2.5" type="button" data-change="1">+</button> 
                    <button class="btn btn-outline-success btn-qty px-2.5 fw-semibold" type="button" data-change="${item.step}">+${item.step}</button> 
                </div> 
            `;
				container.appendChild(div);
			});
		}

		// Υπολογισμός και ενημέρωση των συνόλων στην οθόνη 
		function updateOrderSummary() {
			let totalNet = 0;
			let totalBoxes = 0;

			myProductsList.forEach(item => {
				if (item.quantity > 0) {
					totalNet += item.quantity * item.price;
					if (item.step > 0) {
						totalBoxes += item.quantity / item.step;
					}
				}
			});

			const totalVat = totalNet * 1.13;

			document.getElementById('totalNet').innerText = `€${totalNet.toFixed(2)}`;
			document.getElementById('totalVat').innerText = `€${totalVat.toFixed(2)}`;
			document.getElementById('totalBoxes').innerText = Number(totalBoxes.toFixed(2)).toString();
		}

		searchInput.addEventListener('input', (e) => displayProducts(e.target.value));

		resetQuantitiesBtn.addEventListener('click', function () {
			myProductsList.forEach(product => product.quantity = 0);
			displayProducts(searchInput.value);
			updateOrderSummary();
		});

		container.addEventListener('click', function (event) {
			const button = event.target.closest('.btn-qty');
			if (!button) return;

			const qtyContainer = button.closest('.qty-container');
			const input = qtyContainer.querySelector('.qty-input');
			const productId = parseInt(qtyContainer.getAttribute('data-product-id'), 10);

			const changeAmount = parseInt(button.getAttribute('data-change'), 10);
			let currentValue = parseInt(input.value, 10) || 0;
			let newValue = currentValue + changeAmount;

			if (newValue < 0) newValue = 0;

			input.value = newValue;

			const product = myProductsList.find(p => p.id === productId);
			if (product) {
				product.quantity = newValue;
				updateOrderSummary();
			}
		});

		container.addEventListener('input', function (event) {
			const input = event.target.closest('.qty-input');
			if (!input) return;

			const qtyContainer = input.closest('.qty-container');
			const productId = parseInt(qtyContainer.getAttribute('data-product-id'), 10);

			let newValue = parseInt(input.value, 10) || 0;
			if (newValue < 0) newValue = 0;

			const product = myProductsList.find(p => p.id === productId);
			if (product) {
				product.quantity = newValue;
				updateOrderSummary();
			}
		});

		// Διαχείριση υποβολής παραγγελίας 
		orderForm.addEventListener('submit', function (e) {
			e.preventDefault();
			formResponse.innerHTML = "";

			const selectedProducts = myProductsList.filter(p => p.quantity > 0);

			if (selectedProducts.length === 0) {
				formResponse.innerHTML = `<div class="alert alert-warning text-center small py-2">⚠️ Παρακαλώ επιλέξτε ποσότητα σε τουλάχιστον ένα προϊόν πριν την υποβολή.</div>`;
				return;
			}

			const customerName = document.getElementById('name').value;
			const customerEmail = document.getElementById('email').value;
			const customerComments = document.getElementById('comments').value; // Λήψη των σχολίων

			let currentTotalNet = 0;
			let currentTotalBoxes = 0;
			let productsLinesArray = [];

			selectedProducts.forEach((product, index) => {
				const itemNumber = index + 1;
				const boxes = product.step > 0 ? (product.quantity / product.step) : 0;
				const boxesText = `${Number(boxes.toFixed(2))}K/${product.quantity}τ`;
				const itemTotalCost = (product.quantity * product.price).toFixed(2);

				productsLinesArray.push(`[${boxesText}] #${itemNumber} ${product.name}: €${itemTotalCost}`);

				currentTotalNet += product.quantity * product.price;
				if (product.step > 0) {
					currentTotalBoxes += product.quantity / product.step;
				}
			});

			const currentTotalVat = currentTotalNet * 1.13;

			// Ενσωμάτωση των σχολίων στο τελικό κείμενο της απόδειξης
			const finalReceiptPayload = [
				`ΠΕΛΑΤΗΣ: ${customerName}`,
				`EMAIL: ${customerEmail}`,
				`ΣΧΟΛΙΑ: ${customerComments.trim() ? customerComments : 'Δεν υπάρχουν σχόλια'}`,
				`----------------------------------------------------------------------`,
				productsLinesArray.join("\n"),
				`----------------------------------------------------------------------`,
				`ΣΥΝΟΛΑ -> Κιβώτια: ${Number(currentTotalBoxes.toFixed(2))} | Καθαρή: €${currentTotalNet.toFixed(2)} | Με ΦΠΑ: €${currentTotalVat.toFixed(2)}`
			].join("\n");

			const object = {};
			object["access_key"] = orderForm.access_key.value;
			object["ΠΑΡΑΓΓΕΛΙΑ ΧΟΝΔΡΙΚΗΣ"] = finalReceiptPayload;

			const json = JSON.stringify(object);

			submitBtn.disabled = true;
			submitBtn.innerText = "Αποστολή Παραγγελίας...";

			fetch('https://api.web3forms.com/submit', {
				method: 'POST',
				headers: {
					'Content-Type': 'application/json',
					'Accept': 'application/json'
				},
				body: json
			})
				.then(async response => {
					const data = await response.json();
					if (response.ok && data.success) {
						const thankYouData = {
							name: customerName,
							email: customerEmail,
							comments: customerComments,
							products: productsLinesArray,
							boxes: Number(currentTotalBoxes.toFixed(2)),
							net: currentTotalNet.toFixed(2),
							vat: currentTotalVat.toFixed(2)
						};
						localStorage.setItem('latestOrder', JSON.stringify(thankYouData));

						// Ανακατεύθυνση στη σελίδα ευχαριστιών 
						window.location.href = 'thank-you-gr.html';
					} else {
						formResponse.innerHTML = `<div class="alert alert-danger text-center small py-2">❌ Σφάλμα Διακομιστή: ${data.message || 'Μη έγκυρο Access Key'}</div>`;
					}
				})
				.catch(error => {
					formResponse.innerHTML = `<div class="alert alert-danger text-center small py-2">❌ Αδυναμία σύνδεσης. Βεβαιωθείτε ότι έχετε ίντερνετ και δοκιμάστε ξανά.</div>`;
					console.error(error);
				})
				.finally(() => {
					submitBtn.disabled = false;
					submitBtn.innerText = "Υποβολή Παραγγελίας";
				});
		}); 
	</script>
</body>

</html>
